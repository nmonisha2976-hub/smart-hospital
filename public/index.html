<!DOCTYPE html>
<html>
<head>
  <title>Smart Healthcare System</title>
  <link rel="stylesheet" href="css/style.css">
</head>

<body>

<!-- NAVBAR -->
<div class="navbar">
  <div class="logo">Smart Patient Appointment & Record System</div>
</div>

<!-- MAIN -->
<div class="container">

  <div class="login-box">

    <h2>Welcome to Smart Healthcare</h2>
    <p style="margin-bottom:10px;">Secure login with Google</p>

    <select id="role">
      <option value="patient">👤 Patient</option>
      <option value="doctor">👨‍⚕️ Doctor</option>
      <option value="admin">🛠 Admin</option>
      <option value="hospital">🏥 Hospital</option>
    </select>

    <button class="btn btn-primary" onclick="googleLogin()">
      Sign in with Google
    </button>

  </div>

</div>


<!-- FIREBASE -->
<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import { getAuth, GoogleAuthProvider, signInWithPopup } 
from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";

/* CONFIG */
const firebaseConfig = {
  apiKey: "AIzaSyCxruMYq9tXa2Vixi_MFlvLQrAod_PL0X8",
  authDomain: "smart-hospital-90938.firebaseapp.com",
  projectId: "smart-hospital-90938",
  storageBucket: "smart-hospital-90938.firebasestorage.app",
  messagingSenderId: "1083951079149",
  appId: "1:1083951079149:web:ad42024bf526b52abf76e4"
};

/* INIT */
const app = initializeApp(firebaseConfig);
const auth = getAuth(app);

/* LOGIN */
window.googleLogin = function() {

  const role = document.getElementById("role").value;
  const provider = new GoogleAuthProvider();

  signInWithPopup(auth, provider)
  .then((result) => {

    const user = result.user;

    console.log("LOGIN SUCCESS:", user); // ✅ Debug

    // ✅ CLEAR OLD DATA (important fix)
    localStorage.clear();

    // ✅ STORE USER DATA (consistent across app)
    localStorage.setItem("userName", user.displayName || "User");
    localStorage.setItem("userEmail", user.email || "");
    localStorage.setItem("role", role);

    // ✅ OPTIONAL: store unique ID (best practice)
    localStorage.setItem("userId", user.uid);

    // doctor-specific
    if(role === "doctor"){
      localStorage.setItem("doctorName", user.displayName || "Doctor");
    }

    // ✅ ROLE BASED REDIRECT
    switch(role){
      case "patient":
        window.location.href = "patient.html";
        break;

      case "doctor":
        window.location.href = "doctor.html";
        break;

      case "admin":
        window.location.href = "admin.html";
        break;

      case "hospital":
        window.location.href = "hospital.html";
        break;

      default:
        alert("Invalid role selected");
    }

  })
  .catch((error) => {
    console.log("LOGIN ERROR:", error);
    alert("Login Failed: " + error.message);
  });
}

</script>

</body>
</html>
